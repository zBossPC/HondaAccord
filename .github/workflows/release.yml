name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build --bundles nsis
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_LIVEKIT_URL: ${{ secrets.VITE_LIVEKIT_URL }}

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item "src-tauri/target/release/bundle/nsis/*.exe" release-assets/
          Copy-Item "src-tauri/target/release/honda-accord.exe" "release-assets/HondaAccord_${{ github.ref_name }}_portable.exe"

      - name: Upload Windows installers
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
