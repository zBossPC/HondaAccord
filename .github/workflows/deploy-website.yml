name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  release:
    types: [published]
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

env:
  NEXT_PUBLIC_GITHUB_URL: https://github.com/zBossPC/HondaAccord
  NEXT_PUBLIC_SITE_URL: https://hondaaccord.lol

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install website dependencies
        working-directory: website
        run: pnpm install --ignore-workspace

      - name: Build website
        working-directory: website
        run: pnpm build
        env:
          NEXT_PUBLIC_GITHUB_URL: ${{ vars.NEXT_PUBLIC_GITHUB_URL || env.NEXT_PUBLIC_GITHUB_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || env.NEXT_PUBLIC_SITE_URL }}

      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment summary
        run: |
          echo "Website redeployed to https://hondaaccord.lol"
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "Triggered by release: ${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Triggered after Release workflow completed"
          fi
